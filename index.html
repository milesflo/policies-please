<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policies Please</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="game-header">
            <div class="header-left">
                <div class="game-title">POLICIES PLEASE</div>
                <div class="game-subtitle">TSA Security Checkpoint</div>
            </div>
            <div class="header-right">
                <div id="level-day">DAY 1</div>
                <div id="level-title">ID REQUIRED</div>
                <div id="score-display"></div>
            </div>
        </div>

        <div class="editor-area">

            <div class="left-col">
                <div id="render-window">
                    <div id="person">
                        <div id="head"></div>
                        <div id="body"></div>
                    </div>
                    <div id="stamp-overlay" class="stamp" style="display:none"></div>
                    <div id="desk"></div>
                </div>

                <div class="traveler-bar">
                    <span id="traveler-name">—</span>
                    <span id="traveler-progress"></span>
                </div>

                <div class="briefing-panel">
                    <div class="briefing-label">CHECKPOINT DIRECTIVE</div>
                    <pre id="briefing-text"></pre>
                </div>

                <div class="panel-label">Traveler Data (JSON Input)</div>
                <textarea id="json-input" spellcheck="false"></textarea>
            </div>

            <div class="right-col">
                <div class="panel-label">Policy (Rego) — <code>package tsa</code></div>
                <textarea id="rego-policy" spellcheck="false"></textarea>
            </div>

        </div>

        <div class="controls">
            <button id="evaluate-button">Evaluate Policy</button>
            <button id="next-button" style="display:none">Next →</button>
        </div>

        <div class="output-area">
            <pre id="evaluation-output"></pre>
        </div>

    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
