<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Rego Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="editor-area">
            <div class="left-col" style="width: 300px">
                <div id="render-window">
                    <div id="person">
                        <div id="head"></div>
                        <div id="body"></div>
                    </div>
                    <div id="desk">

                    </div>
                </div>
                <div class="code-panel">
                    <textarea id="json-input" style="height:300px" spellcheck="false" placeholder="{&#10;  &quot;user&quot;: &quot;alice&quot;,&#10;  &quot;method&quot;: &quot;GET&quot;&#10;}"></textarea>
                </div>
            </div>
            <div class="code-panel">
                <h2>Policy (Rego)</h2>
                <textarea id="rego-policy" style="height:calc(100% - 27px)" spellcheck="false" placeholder="package play&#10;&#10;default allow = false&#10;&#10;allow {&#10;  input.user == &quot;alice&quot;&#10;}"></textarea>
            </div>
        </div>

        <button id="evaluate-button">Evaluate (Requires OPA/Wasm)</button>

        <div class="output-area">
            <h2>Output</h2>
            <pre id="evaluation-output">{ "allow": true }</pre>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
